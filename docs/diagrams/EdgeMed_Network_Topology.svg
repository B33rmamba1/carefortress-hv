<svg width="680" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>EdgeMed Secure Network Topology</title>
<desc>Network topology showing Proxmox host VM 102 containing two isolated guest VMs on separate virtual networks, with UFW firewall enforcing deny-forward policy between them.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1F2937; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; font-weight: 400; fill: #6B7280; }
    .label-green { fill: #085041; }
    .label-red   { fill: #A32D2D; }
    .label-teal  { fill: #0F6E56; }
    .label-navy  { fill: #0D1B2A; }
  </style>
</defs>

<!-- background -->
<rect width="680" height="820" fill="#FFFFFF"/>

<!-- Legend -->
<rect x="30" y="16" width="10" height="10" rx="2" fill="none" stroke="#1A7A8A" stroke-width="1.5" stroke-dasharray="4 2"/>
<text class="ts" x="46" y="25">Isolated network boundary</text>
<rect x="200" y="16" width="10" height="10" rx="2" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 2"/>
<text class="ts" x="216" y="25">Host boundary</text>
<rect x="320" y="20" width="10" height="3" rx="1" fill="#E24B4A"/>
<text class="ts" x="336" y="25">Blocked (UFW deny)</text>
<rect x="470" y="20" width="10" height="3" rx="1" fill="#1D9E75"/>
<text class="ts" x="486" y="25">Allowed</text>

<!-- Internet cloud -->
<ellipse cx="290" cy="56" rx="52" ry="26" fill="none" stroke="#9CA3AF" stroke-width="1"/>
<ellipse cx="268" cy="62" rx="22" ry="16" fill="none" stroke="#9CA3AF" stroke-width="1"/>
<ellipse cx="312" cy="62" rx="22" ry="16" fill="none" stroke="#9CA3AF" stroke-width="1"/>
<ellipse cx="290" cy="66" rx="40" ry="14" fill="none" stroke="#9CA3AF" stroke-width="1"/>
<text class="ts" x="290" y="62" text-anchor="middle" dominant-baseline="central">Internet</text>

<!-- Arrow: Internet to host -->
<line x1="290" y1="82" x2="290" y2="118" stroke="#9CA3AF" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="300" y="104">WAN</text>

<!-- Proxmox host boundary -->
<rect x="30" y="120" width="620" height="650" rx="16" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="6 3"/>
<text class="th label-navy" x="50" y="146">Proxmox host — Threadripper 2950x / 64GB RAM</text>
<text class="ts" x="50" y="162">Proxmox VE 9.2.0  |  Kernel 7.0.6  |  192.168.1.240</text>

<!-- VM 102 boundary -->
<rect x="50" y="174" width="580" height="580" rx="12" fill="none" stroke="#1A7A8A" stroke-width="1.5" stroke-dasharray="5 3"/>
<text class="th label-navy" x="70" y="198">VM 102 — Ubuntu 26.04 LTS  |  KVM hypervisor host</text>
<text class="ts" x="70" y="214">192.168.1.92  |  4 vCPUs  |  16GB RAM  |  64GB disk  |  TPM 2.0</text>

<!-- vmbr0 bridge -->
<rect x="190" y="224" width="200" height="44" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="0.5"/>
<text class="th label-navy" x="290" y="242" text-anchor="middle" dominant-baseline="central">vmbr0</text>
<text class="ts" x="290" y="258" text-anchor="middle" dominant-baseline="central">Host bridge — 192.168.1.92/24</text>

<!-- UFW firewall box -->
<rect x="430" y="224" width="180" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="520" y="242" text-anchor="middle" dominant-baseline="central" fill="#993C1D">UFW firewall</text>
<text class="ts" x="520" y="258" text-anchor="middle" dominant-baseline="central">Default deny  |  port 22 allow</text>

<!-- Arrow: vmbr0 to internet -->
<line x1="290" y1="224" x2="290" y2="82" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<rect x="296" y="140" width="52" height="18" rx="4" fill="#DCFCE7" stroke="#1D9E75" stroke-width="0.5"/>
<text class="ts label-green" x="322" y="152" text-anchor="middle" dominant-baseline="central">SSH :22</text>

<!-- libvirt default network -->
<rect x="170" y="300" width="240" height="44" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="0.5"/>
<text class="th label-navy" x="290" y="318" text-anchor="middle" dominant-baseline="central">default network</text>
<text class="ts" x="290" y="334" text-anchor="middle" dominant-baseline="central">virbr0 — 192.168.122.1/24 — NAT</text>

<!-- Arrow: vmbr0 to default -->
<line x1="290" y1="268" x2="290" y2="300" stroke="#9CA3AF" stroke-width="1" marker-end="url(#arrow)"/>

<!-- mednet boundary -->
<rect x="62" y="380" width="256" height="344" rx="10" fill="none" stroke="#1A7A8A" stroke-width="1.5" stroke-dasharray="4 2"/>
<text class="th label-teal" x="190" y="400" text-anchor="middle">mednet</text>
<text class="ts" x="190" y="415" text-anchor="middle">virbr1 — 10.10.1.1/24</text>

<!-- mgmtnet boundary -->
<rect x="362" y="380" width="256" height="344" rx="10" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 2"/>
<text class="th" x="490" y="400" text-anchor="middle" fill="#3C3489">mgmtnet</text>
<text class="ts" x="490" y="415" text-anchor="middle">virbr2 — 10.10.2.1/24</text>

<!-- mednet bridge box -->
<rect x="100" y="424" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="190" y="442" text-anchor="middle" dominant-baseline="central" fill="#085041">virbr1 bridge</text>
<text class="ts" x="190" y="458" text-anchor="middle" dominant-baseline="central">DHCP  10.10.1.2–254</text>

<!-- mgmtnet bridge box -->
<rect x="400" y="424" width="180" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="490" y="442" text-anchor="middle" dominant-baseline="central" fill="#3C3489">virbr2 bridge</text>
<text class="ts" x="490" y="458" text-anchor="middle" dominant-baseline="central">DHCP  10.10.2.2–254</text>

<!-- medical-vm -->
<rect x="82" y="510" width="216" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="190" y="534" text-anchor="middle" dominant-baseline="central" fill="#085041">medical-vm</text>
<text class="ts" x="190" y="552" text-anchor="middle" dominant-baseline="central">Alpine 3.23  |  10.10.1.71</text>
<text class="ts" x="190" y="568" text-anchor="middle" dominant-baseline="central">Simulates certified legacy OS</text>

<!-- mgmt-vm -->
<rect x="382" y="510" width="216" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="490" y="534" text-anchor="middle" dominant-baseline="central" fill="#3C3489">mgmt-vm</text>
<text class="ts" x="490" y="552" text-anchor="middle" dominant-baseline="central">Alpine 3.23  |  10.10.2.64</text>
<text class="ts" x="490" y="568" text-anchor="middle" dominant-baseline="central">Simulates management layer</text>

<!-- Arrows: bridges to VMs -->
<line x1="190" y1="468" x2="190" y2="510" stroke="#1A7A8A" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="490" y1="468" x2="490" y2="510" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Arrows: default net to bridges -->
<path d="M200 344 L200 370 L150 370 L150 424" fill="none" stroke="#9CA3AF" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M380 344 L380 370 L470 370 L470 424" fill="none" stroke="#9CA3AF" stroke-width="1" marker-end="url(#arrow)"/>

<!-- BLOCKED arrow between VMs -->
<line x1="298" y1="550" x2="382" y2="550" stroke="#E24B4A" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<rect x="302" y="536" width="76" height="20" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text class="ts label-red" x="340" y="549" text-anchor="middle" dominant-baseline="central">UFW DENY</text>

<!-- Isolation test result -->
<rect x="82" y="622" width="536" height="50" rx="8" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2"/>
<text class="th label-teal" x="350" y="642" text-anchor="middle" dominant-baseline="central">Isolation test — PASS — June 8, 2026</text>
<text class="ts" x="350" y="660" text-anchor="middle" dominant-baseline="central">ping mgmt-vm → medical-vm: Network unreachable  |  ping medical-vm → mgmt-vm: Network unreachable</text>

<!-- UFW log note -->
<rect x="82" y="686" width="536" height="42" rx="8" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2"/>
<text class="th label-red" x="350" y="703" text-anchor="middle" dominant-baseline="central">UFW logging — active</text>
<text class="ts" x="350" y="719" text-anchor="middle" dominant-baseline="central">Blocked attempts logged to /var/log/ufw.log with src/dst/proto metadata</text>

<!-- Windows client -->
<rect x="430" y="732" width="200" height="44" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="0.5"/>
<text class="th label-navy" x="530" y="750" text-anchor="middle" dominant-baseline="central">Windows client</text>
<text class="ts" x="530" y="766" text-anchor="middle" dominant-baseline="central">192.168.1.11  |  SSH admin</text>

<!-- Arrow: Windows to VM 102 -->
<path d="M530 732 L530 710 L622 710 L622 192 L632 192" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts label-green" x="590" y="188">SSH :22</text>

</svg>
